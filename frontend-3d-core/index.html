<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRIDAY Core</title>
    <meta
      name="description"
      content="FRIDAY real-time voice intelligence core with local speech, streaming reasoning, and a living plasma field."
    />
  </head>
  <body>
    <div id="app">
      <canvas id="canvas3d"></canvas>

      <div class="hud">
        <header class="masthead">
          <div class="brand-mark">
            <span class="brand-ring"></span>
            <div>
              <p class="eyebrow">Local Intelligence Core</p>
              <h1>FRIDAY</h1>
            </div>
          </div>
          <div class="mode-pill" id="mode-pill" data-mode="idle">
            <span class="mode-dot" id="mode-dot"></span>
            <span id="mode-label">IDLE</span>
          </div>
        </header>

        <main class="center-hud">
          <div class="caption-stack">
            <p class="lead-line" id="lead-line">Voice transport offline.</p>
            <p class="sub-line" id="sub-line">Arm the microphone once and FRIDAY will stay in continuous listening mode.</p>
            <p class="whisper-line" id="whisper-line">No typing. No chat window. Just signal, thought, and speech.</p>
          </div>
        </main>

        <footer class="control-strip">
          <button class="activate-button" id="activate-button" type="button">Arm Voice Core</button>
          <div class="signal-readout">
            <span class="signal-label">MIC</span>
            <div class="signal-bar"><span id="mic-bar"></span></div>
          </div>
          <div class="signal-readout">
            <span class="signal-label">VOICE</span>
            <div class="signal-bar"><span id="voice-bar"></span></div>
          </div>
        </footer>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
