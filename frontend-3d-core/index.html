<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRIDAY 3D Core - Forensic Observer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="canvas3d"></canvas>
      
      <div id="mcp-interface" class="hud">
        <div id="StatusIndicator" class="component">
          <div class="mcp-signal-indicator">
            <div class="signal-dot"></div>
            <span id="presence-mode">SYS.IDLE</span>
          </div>
          <div class="status-text">
            <h1 id="presence-headline">FRIDAY AI</h1>
            <p id="presence-whisper">AWAITING SEQUENCE</p>
          </div>
        </div>

        <div id="ResponseHUD" class="component">
          <div class="terminal-container">
            <div id="terminal-output">Ready for instruction.</div>
          </div>
        </div>

        <div id="TelemetryPanel" class="component collapsed">
          <div class="panel-header">
            <h3>TELEMETRY</h3>
            <span class="toggle-icon">></span>
          </div>
          <div class="panel-content">
            <div id="feed-list"></div>
          </div>
        </div>

        <div id="InputBar" class="component">
          <button id="mic-toggle" class="mic-btn" title="Toggle Voice Input">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
              <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <form id="objective-form">
            <input type="text" id="objective-input" placeholder="Awaiting text or voice input..." autocomplete="off" />
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
